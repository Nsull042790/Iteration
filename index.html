<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITERATION</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="loading-screen">
            <div class="loading-text">INITIALIZING SIMULATION...</div>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>

        <!-- Controls Modal -->
        <div id="controls-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="modal-title">CONTROL PROTOCOL</div>
                    <div class="modal-subtitle">// BLADE INTERFACE v1.0</div>
                </div>

                <div class="controls-layout">
                    <div class="control-section">
                        <div class="section-title">LEFT HAND</div>
                        <div class="control-group">
                            <div class="control-item">
                                <div class="key-cluster wasd">
                                    <div class="key-row">
                                        <span class="key">W</span>
                                    </div>
                                    <div class="key-row">
                                        <span class="key">A</span>
                                        <span class="key">S</span>
                                        <span class="key">D</span>
                                    </div>
                                </div>
                                <span class="control-label">MOVE</span>
                            </div>
                            <div class="control-item">
                                <span class="key wide">SPACE</span>
                                <span class="control-label">JUMP</span>
                            </div>
                        </div>
                    </div>

                    <div class="control-divider"></div>

                    <div class="control-section">
                        <div class="section-title">RIGHT HAND</div>
                        <div class="control-group">
                            <div class="control-item">
                                <div class="key-cluster arrows">
                                    <div class="key-row">
                                        <span class="key arrow">↑</span>
                                    </div>
                                    <div class="key-row">
                                        <span class="key arrow">←</span>
                                        <span class="key arrow">↓</span>
                                        <span class="key arrow">→</span>
                                    </div>
                                </div>
                                <div class="arrow-labels">
                                    <span class="arrow-label top">ATTACK</span>
                                    <span class="arrow-label left">INTERACT</span>
                                    <span class="arrow-label bottom">SPECIAL</span>
                                    <span class="arrow-label right">ATTACK</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <label class="checkbox-container">
                        <input type="checkbox" id="dont-show-again">
                        <span class="checkmark"></span>
                        <span class="checkbox-label">Don't show again</span>
                    </label>
                    <button id="start-button" class="start-btn">
                        <span class="btn-text">BEGIN ITERATION</span>
                        <span class="btn-icon">▶</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Core Systems -->
    <script src="src/utils/helpers.js"></script>
    <script src="src/core/constants.js"></script>
    <script src="src/core/input.js"></script>
    <script src="src/core/physics.js"></script>
    <script src="src/core/camera.js"></script>
    <script src="src/entities/entity.js"></script>
    <script src="src/entities/player.js"></script>
    <script src="src/levels/platform.js"></script>
    <script src="src/levels/room.js"></script>
    <script src="src/systems/cycles.js"></script>
    <script src="src/ui/hud.js"></script>
    <script src="src/core/renderer.js"></script>
    <script src="src/core/game.js"></script>
    <script src="main.js"></script>
</body>
</html>
